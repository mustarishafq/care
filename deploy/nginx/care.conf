server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name your-domain.com;

    ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    root /var/www/care/frontend/dist;
    index index.html;

    client_max_body_size 20M;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Required so /api/* (including /api/mcp/v1/catalog for Nexus Brain) hits Laravel, not the SPA.
    # Split deployment (frontend + careapi subdomain): proxy to the API vhost.
    location /api/ {
        proxy_pass https://careapi.emzinexus.com/api/;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host careapi.emzinexus.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Single-host deployment (artisan serve or php-fpm on :8000): use this instead.
    # location /api/ {
    #     proxy_pass http://127.0.0.1:8000/api/;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }

    location /storage {
        alias /var/www/care/backend/storage/app/public;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
