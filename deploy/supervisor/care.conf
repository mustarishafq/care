[program:care-queue]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/care/backend/artisan queue:work --sleep=3 --tries=3 --max-time=3600
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=2
redirect_stderr=true
stdout_logfile=/var/log/supervisor/care-queue.log
stopwaitsecs=3600

[program:care-scheduler]
process_name=%(program_name)s
command=/bin/bash -c "while true; do php /var/www/care/backend/artisan schedule:run --verbose --no-interaction; sleep 60; done"
autostart=true
autorestart=true
user=www-data
redirect_stderr=true
stdout_logfile=/var/log/supervisor/care-scheduler.log
